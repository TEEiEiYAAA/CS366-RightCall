service: rightcall-services

provider:
  name: aws
  runtime: nodejs18.x
  region: us-east-1
  environment:
    ALERT_TABLE: RightCall-Alerts-${sls:stage}
    QUEUE_URL: { Ref: CoordinatorIncidentQueue }
  iam:
    role:
      statements:
        # อนุญาตให้ Lambda คุยกับ DynamoDB ได้
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:GetItem
            - dynamodb:UpdateItem
          Resource: "arn:aws:dynamodb:${aws:region}:*:table/${self:provider.environment.ALERT_TABLE}"
        # อนุญาตให้ Lambda ส่งข้อความเข้า SQS ได้
        - Effect: Allow
          Action:
            - sqs:SendMessage
          Resource: { Fn::GetAtt: [ CoordinatorIncidentQueue, Arn ] }

functions:
  # 1. API สำหรับให้ Coordinator กดสร้างแจ้งเตือน (Sync)
  createAlert:
    handler: src/handlers/api/createAlert.handler
    events:
      - httpApi:
          path: /incidents/alerts
          method: post

  # 2. ตัวรับ Message จาก SQS (Async Consumer)
  sqsIncidentConsumer:
    handler: src/handlers/consumers/sqsIncident.handler
    events:
      - sqs:
          arn: { Fn::GetAtt: [ CoordinatorIncidentQueue, Arn ] }
          batchSize: 10 # ดึงมาประมวลผลทีละ 10 ข้อความ

  # 3. ตัวรับข้อมูลจาก DynamoDB Streams เวลา SQS ล่ม (Fallback)
  dynamoFallbackConsumer:
    handler: src/handlers/consumers/dynamoFallback.handler
    events:
      - stream:
          type: dynamodb
          arn: { Fn::GetAtt: [ AlertsTable, StreamArn ] }
          batchSize: 10

resources:
  Resources:
    # สร้าง SQS Queue
    CoordinatorIncidentQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: coordinator-incident-queue-${sls:stage}

    # สร้าง DynamoDB Table
    AlertsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.ALERT_TABLE}
        BillingMode: PAY_PER_REQUEST # จ่ายตามที่ใช้จริง (ประหยัดกว่าตอนไม่มีภัยพิบัติ)
        AttributeDefinitions:
          - AttributeName: incident_id
            AttributeType: S
        KeySchema:
          - AttributeName: incident_id
            KeyType: HASH
        # เปิดใช้งาน DynamoDB Streams สำหรับ Fallback
        StreamSpecification:
          StreamViewType: NEW_AND_OLD_IMAGES